<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Wedding Seating Lookup</title>

<style>

:root {
  --shadow: 0 12px 28px rgba(0,0,0,.28);
}

body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#111;
  color:#fff;
}

input,
select,
textarea {
  font-size:16px !important;
}

.topbar{
  position:sticky;
  top:0;
  z-index:50;
  background:#111;
  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,.1);
  display:flex;
  gap:10px;
  align-items:center;
  justify-content:space-between;
}

.topbar .left{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.globalSearch{
  width:min(420px,48vw);
  padding:10px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.08);
  color:#fff;
  outline:none;
  box-sizing:border-box;
}

.globalSearch::placeholder{
  color:rgba(255,255,255,.7);
}

.btn{
  border:0;
  border-radius:12px;
  padding:10px 12px;
  cursor:pointer;
  font-weight:800;
}

.wrap{
  display:flex;
  justify-content:center;
  padding:12px;
}

.canvas{
  position:relative;
  width:min(1100px,100%);
  background:#000;
  border-radius:12px;
  overflow:hidden;
  box-shadow:var(--shadow);
}

.canvas img{
  width:100%;
  height:auto;
  display:block;
}

.hotspot{
  position:absolute;
  width:6.4%;
  aspect-ratio:1/1;
  border-radius:999px;
  transform:translate(-50%,-50%);
  cursor:pointer;
  background:rgba(255,255,255,0);
  border:3px solid rgba(255,255,255,0);
  transition:.2s ease;
  box-sizing:border-box;
}

.hotspot.empty{
  border-color:rgba(255,255,255,0);
}

.hotspot.partial{
  border-color:rgba(255,193,7,.95);
  background:rgba(255,193,7,.18);
}

.hotspot.full{
  border-color:rgba(40,167,69,.95);
  background:rgba(40,167,69,.22);
}

.debug .hotspot{
  border-color:rgba(0,200,255,.9);
  background:rgba(0,200,255,.12);
}

.popup{
  position:fixed;
  left:10px;
  right:10px;
  top:90px;
  margin:0 auto;
  max-width:520px;
  background:#fff;
  color:#111;
  border-radius:14px;
  box-shadow:var(--shadow);
  display:none;
  overflow:hidden;
  z-index:9999;
}

.popup.open{
  display:block;
}

.phead{
  padding:10px 12px;
  background:#fafafa;
  border-bottom:1px solid #eee;
  display:flex;
  align-items:center;
  gap:10px;
}

.phead .spacer{
  flex:1;
}

.phead button{
  border:0;
  border-radius:10px;
  padding:8px 10px;
  cursor:pointer;
  font-weight:800;
  background:#eee;
}

.pbody{
  padding:10px 12px;
}

.search{
  width:100%;
  padding:10px 12px;
  border:1px solid #ddd;
  border-radius:12px;
  outline:none;
  margin-bottom:10px;
  box-sizing:border-box;
}

.list{
  max-height:52vh;
  overflow:auto;
  border:1px solid #eee;
  border-radius:12px;
}

.item{
  padding:10px 12px;
  border-bottom:1px solid #f2f2f2;
  font-weight:700;
}

.item:last-child{
  border-bottom:0;
}

.empty{
  padding:12px;
  color:#666;
}

.editPanel{
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;
  margin:0 auto;
  max-width:820px;
  background:rgba(0,0,0,.82);
  border:1px solid rgba(255,255,255,.15);
  border-radius:14px;
  padding:10px 12px;
  display:none;
  z-index:9999;
}

.editPanel.open{
  display:block;
}

.editPanel.minimized .codeBox,
.editPanel.minimized .editRow span,
.editPanel.minimized #copyBtn,
.editPanel.minimized #doneBtn,
.editPanel.minimized #editSelect,
.editPanel.minimized label{
  display:none;
}

.editPanel.minimized{
  max-width:220px;
}

.editRow{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

.editPanel select,
.editPanel input{
  border-radius:10px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.08);
  color:#fff;
  padding:8px 10px;
  outline:none;
}

.codeBox{
  width:100%;
  height:120px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(0,0,0,.35);
  color:#fff;
  padding:10px;
  font-size:12px !important;
  box-sizing:border-box;
}

@media (max-width:600px){

  .topbar{
    align-items:stretch;
    flex-direction:column;
  }

  .globalSearch{
    width:100%;
  }

  .popup{
    top:115px;
    max-height:70vh;
  }

  .list{
    max-height:48vh;
  }

  .hotspot{
    width:9%;
  }

  .wrap{
    padding:8px 4px;
  }

}

</style>
</head>

<body>

<div class="topbar">
  <div class="left">
    <b>Wedding Seating Lookup</b>
    <small>Tap a table → see guest list</small>
  </div>

  <input
    class="globalSearch"
    id="globalSearch"
    placeholder="Search guest name..."
  />

  <button class="btn" id="closePopupBtn" style="display:none;">
    Close
  </button>
</div>

<div class="wrap">
  <div class="canvas" id="canvas">

    <picture>
      <source media="(max-width: 600px)" srcset="mobile.layout.jpg">
      <img src="layout.jpg" alt="Layout" id="layoutImg" />
    </picture>

  </div>
</div>

<div class="popup" id="popup">

  <div class="phead">
    <b id="popupTitle">Table</b>
    <div class="spacer"></div>
    <button id="popupClose">Close</button>
  </div>

  <div class="pbody">

    <input
      class="search"
      id="tableSearch"
      placeholder="Search within table..."
    />

    <div class="list" id="tableList"></div>

  </div>
</div>

<div class="editPanel" id="editPanel">

  <div class="editRow">

    <b
      style="color:#fff; cursor:pointer;"
      id="toggleEdit"
    >
      EDIT MODE ▼
    </b>

    <span style="opacity:.85;">
      Click table position to save x/y
    </span>

    <label style="color:#fff;">Table:</label>

    <select id="editSelect"></select>

    <button class="btn" id="copyBtn">
      Copy JSON
    </button>

    <button class="btn" id="doneBtn">
      Done
    </button>

  </div>

  <textarea class="codeBox" id="coordsBox" readonly></textarea>

</div>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRfxKCWkP3B8EtOiAVp2Ku-kTmfMzgeQ3rtVe4ch-dnhhXDviIMWEFws0fegg8f594XxtRbTPhAHl-y/pub?gid=0&single=true&output=csv";

let HOTSPOTS = [

  { "id":"VIP 1","x":73.09,"y":35.23 },
  { "id":"VIP 2","x":73.64,"y":55.43 }

];

let PORTRAIT_HOTSPOTS = [

  { "id":"VIP 1","x":34.8,"y":21.8 },
  { "id":"VIP 2","x":68.1,"y":21.8 }

];

function isMobileLayout(){
  return window.matchMedia("(max-width: 600px)").matches;
}

function getCurrentHotspots(){
  return isMobileLayout()
    ? PORTRAIT_HOTSPOTS
    : HOTSPOTS;
}

const qs = new URLSearchParams(location.search);

const isEdit = qs.get("edit") === "1";
const isDebug = qs.get("debug") === "1";

const canvas = document.getElementById("canvas");
const popup = document.getElementById("popup");
const popupTitle = document.getElementById("popupTitle");
const tableSearch = document.getElementById("tableSearch");
const tableList = document.getElementById("tableList");
const popupClose = document.getElementById("popupClose");
const closePopupBtn = document.getElementById("closePopupBtn");
const globalSearch = document.getElementById("globalSearch");

const editPanel = document.getElementById("editPanel");
const editSelect = document.getElementById("editSelect");
const coordsBox = document.getElementById("coordsBox");
const copyBtn = document.getElementById("copyBtn");
const doneBtn = document.getElementById("doneBtn");

if(isDebug){
  document.body.classList.add("debug");
}

if(isEdit){
  editPanel.classList.add("open");
}

const toggleEdit = document.getElementById("toggleEdit");

toggleEdit?.addEventListener("click", () => {

  editPanel.classList.toggle("minimized");

  toggleEdit.textContent =
    editPanel.classList.contains("minimized")
      ? "EDIT MODE ▲"
      : "EDIT MODE ▼";

});

let tableToNames = {};
let allGuests = [];

async function loadSheet(){

  const res = await fetch(
    `${CSV_URL}&_ts=${Date.now()}`,
    { cache:"no-store" }
  );

  const text = await res.text();

  const rows =
    text.trim().split("\n").map(r => r.split(","));

  const headers =
    rows[0].map(h => h.trim().toLowerCase());

  const tableIdx =
    headers.findIndex(h => h.includes("table"));

  const nameIdx =
    headers.findIndex(h => h.includes("name"));

  const map = {};
  const guests = [];

  for(let i=1;i<rows.length;i++){

    const r = rows[i];

    const t = (r[tableIdx] || "").trim();
    const n = (r[nameIdx] || "").trim();

    if(!t || !n) continue;

    if(!map[t]) map[t] = [];

    map[t].push(n);

    guests.push({
      name:n,
      table:t
    });

  }

  tableToNames = map;
  allGuests = guests;

}

function buildHotspots(){

  canvas.querySelectorAll(".hotspot")
    .forEach(el => el.remove());

  getCurrentHotspots().forEach(h => {

    const el = document.createElement("div");

    el.className = "hotspot";

    el.style.left = h.x + "%";
    el.style.top = h.y + "%";

    const guestCount =
      (tableToNames[h.id] || []).length;

    if(guestCount >= 10){
      el.classList.add("full");
    }
    else if(guestCount > 0){
      el.classList.add("partial");
    }

    el.addEventListener("click",(e)=>{

      e.stopPropagation();

      if(isEdit) return;

      openTable(h.id);

    });

    canvas.appendChild(el);

  });

}

function openTable(id){

  const names = tableToNames[id] || [];

  popupTitle.textContent =
    `Table ${id} (${names.length}/10 pax)`;

  popup.classList.add("open");

  closePopupBtn.style.display = "inline-block";

  renderTableList(names);

}

function closeTable(){

  popup.classList.remove("open");

  closePopupBtn.style.display = "none";

}

function renderTableList(names){

  tableList.innerHTML = "";

  if(!names.length){

    tableList.innerHTML =
      `<div class="empty">No guests found</div>`;

    return;

  }

  names.forEach(n=>{

    const item = document.createElement("div");

    item.className = "item";

    item.textContent = n;

    tableList.appendChild(item);

  });

}

popupClose.addEventListener("click",closeTable);
closePopupBtn.addEventListener("click",closeTable);

globalSearch.addEventListener("input",()=>{

  const q =
    globalSearch.value.trim().toLowerCase();

  if(!q){
    closeTable();
    return;
  }

  const matches =
    allGuests.filter(g =>
      g.name.toLowerCase().includes(q)
    );

  popupTitle.textContent =
    `Matches for "${q}"`;

  popup.classList.add("open");

  closePopupBtn.style.display = "inline-block";

  tableList.innerHTML = "";

  matches.forEach(m=>{

    const item = document.createElement("div");

    item.className = "item";

    item.textContent =
      `${m.name} — Table ${m.table}`;

    tableList.appendChild(item);

  });

});

window.addEventListener("resize",()=>{
  buildHotspots();
});

(async function start(){

  await loadSheet();

  buildHotspots();

})();
</script>

</body>
</html>
